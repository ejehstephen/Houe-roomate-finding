<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description"
    content="Find compatible roommates and perfect student housing. Connect with students who share your lifestyle and preferences.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="CampsNest">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>CampsNest - Student House,Roommate Finder</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      background-color: #FFFFFF;
      margin: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(0, 0, 0, 0.05);
      border-top: 3px solid rgba(0, 86, 210, 0.4);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div class="loading-container" id="loading-indicator">
    <div class="spinner"></div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  <script>
    // Note: The flutter_bootstrap.js handles canvas injection. 
    // We listen to the window load to remove the indicator, though 
    // ideally Flutter automatically clears the DOM when it attaches.
    // If not, we can manually prune it.
    window.addEventListener('flutter-first-frame', function () {
      var loadingIndicator = document.getElementById('loading-indicator');
      if (loadingIndicator) {
        loadingIndicator.remove();
      }
    });

    // Alternatively, if flutter-first-frame isn't firing on older web setups:
    setTimeout(function () {
      var loadingIndicator = document.getElementById('loading-indicator');
      if (loadingIndicator && document.querySelector('flt-glass-pane')) {
        loadingIndicator.remove();
      }
    }, 3000);
  </script>
</body>

</html>
